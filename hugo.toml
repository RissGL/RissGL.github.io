baseURL = "https://RissGL.github.io/"
languageCode = "en-us" # 如果写中文，可以改为 "zh-cn"
title = "RissAR的博客"
theme = "huey"
canonifyurls = true

[params]
  author = "RissGL"
  description = "这是一个基于 Huey 主题的极简博客"
  dateFormat = "2006-01-02" 
  favicon = "mylogo.ico"
  staticDir = ['static']
  # fontawesomeToken = "你的Token" # 如果以后你想加图标，在这里配置

[pagination]
  disableAliases = false
  pagerSize = 5
  path = 'page'

# -----------------------------------
# 关键修复点：顶部导航菜单 (注意这里是 [menu] 下嵌套)
# -----------------------------------
[menu]

  [[menu.nav]]
    identifier = 'home'
    name = '首页'
    title = '首页'
    url = '/'
    weight = 10

  [[menu.nav]]
    identifier = 'archive'
    name = '文章'
    title = "文章归档"
    url = '/archive/'
    weight = 20

  [[menu.nav]]
    identifier = 'about'
    name = '关于我'
    title = '关于我'
    url = '/about/'
    weight = 30

  # 底部社交链接 (可选)
  [[menu.social]]
    identifier = 'github'
    name = 'Github'
    url = "https://github.com/RissGL"
    weight = 20